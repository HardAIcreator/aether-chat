<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aether · ultimate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      transition: background 0.3s;
      background: #0b0f19;
    }

    /* Динамические темы: фон и цвет текста через переменные */
    body {
      --bg-gradient: radial-gradient(circle at 30% 40%, #1e2640 0%, #080c14 90%);
      --glass-bg: rgba(20, 30, 45, 0.6);
      --glass-card: rgba(15, 25, 40, 0.7);
      --text-primary: #f0f4ff;
      --text-secondary: #a0b3d9;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.5);
      --border-light: rgba(255,255,255,0.05);
      --wallpaper: none;
      color: var(--text-primary);
      background-image: var(--wallpaper) !important;
      background-size: cover;
      background-position: center;
    }

    body.light {
      --bg-gradient: radial-gradient(circle at 30% 40%, #f0f4ff 0%, #d9e2f0 90%);
      --glass-bg: rgba(255, 255, 255, 0.5);
      --glass-card: rgba(255, 255, 255, 0.6);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --border-light: rgba(0,0,0,0.1);
    }

    body.wallpaper-custom {
      background-image: var(--wallpaper);
      background-size: cover;
    }

    .glass-panel, #auth-screen, .sidebar, .chat-area, .search-box, .current-chat-name, #messages, .contact-item, .msg, .context-menu, .action-bar {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--glass-card);
      border: 1px solid var(--border-light);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    #auth-screen {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    input, button, .theme-btn {
      padding: 12px 16px;
      border-radius: 40px;
      border: none;
      outline: none;
      background: rgba(0,0,0,0.2);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    button, .theme-btn {
      background: var(--accent);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    #main-wrapper {
      display: none;
      width: 100%;
      height: 100vh;
      max-height: 95vh;
      border-radius: 2rem;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
    }

    .sidebar {
      width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-light);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .theme-panel {
      position: absolute;
      top: 70px;
      right: 16px;
      background: var(--glass-card);
      border-radius: 20px;
      padding: 16px;
      z-index: 200;
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 200px;
    }

    .theme-panel.show {
      display: flex;
    }

    .wallpaper-option {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .wallpaper-option.selected {
      border-color: var(--accent);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: transparent;
    }

    .msg {
      display: flex;
      max-width: 75%;
      animation: popIn 0.2s;
      position: relative;
    }

    .msg.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.received {
      align-self: flex-start;
    }

    .msg.pinned {
      border: 2px solid var(--accent);
    }

    .avatar-bubble {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      margin: 0 8px;
      flex-shrink: 0;
    }

    .bubble-content {
      background: rgba(30,40,60,0.8);
      padding: 10px 16px;
      border-radius: 22px;
      word-break: break-word;
    }

    .msg.sent .bubble-content {
      background: var(--accent);
    }

    .bubble-text img, .bubble-text video {
      max-width: 200px;
      border-radius: 12px;
      cursor: pointer;
    }

    .msg-time {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    .reactions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .reaction {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2px 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .pinned-badge {
      font-size: 0.7rem;
      background: var(--accent);
      border-radius: 12px;
      padding: 2px 8px;
      margin-left: 8px;
    }

    .action-bar {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 40px;
      z-index: 150;
      display: none;
    }

    .action-bar button {
      background: transparent;
      border: none;
      font-size: 1.5rem;
    }

    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }

    .modal img, .modal video {
      max-width: 90%;
      max-height: 90%;
    }

    @media (max-width: 700px) {
      .sidebar {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(0);
        z-index: 5;
      }
      .chat-area {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 10;
      }
      .chat-area.active {
        transform: translateX(0);
      }
      #back-to-contacts {
        display: inline-block !important;
      }
    }
  </style>
</head>
<body>
  <!-- Кнопка темы и обоев -->
  <button id="themeBtn" style="position:absolute; top:16px; right:16px; z-index:300;"><i class="fas fa-palette"></i></button>
  <div class="theme-panel" id="themePanel">
    <h4>Цвет текста</h4>
    <input type="color" id="textColor" value="#f0f4ff">
    <h4>Обои</h4>
    <div class="wallpaper-option" style="background: radial-gradient(circle at 30% 40%, #1e2640 0%, #080c14 90%);" data-wall="none"></div>
    <div class="wallpaper-option" style="background: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=300') center/cover;" data-wall="url('https://images.unsplash.com/photo-1557683316-973673baf926?w=300')"></div>
    <div class="wallpaper-option" style="background: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=300') center/cover;" data-wall="url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=300')"></div>
    <input type="file" id="wallpaperUpload" accept="image/*">
  </div>

  <!-- Auth screen -->
  <div id="auth-screen">
    <h2><i class="fas fa-cube"></i> AETHER ULTIMATE</h2>
    <input type="text" id="auth-nick" placeholder="никнейм">
    <input type="password" id="auth-pass" placeholder="пароль">
    <button id="btn-login"><i class="fas fa-key"></i> Войти / Создать</button>
  </div>

  <!-- Main app -->
  <div id="main-wrapper">
    <div class="sidebar" id="sidebar">
      <div class="search-box">
        <input type="text" id="search-user" placeholder="поиск...">
        <button id="btn-search"><i class="fas fa-search"></i></button>
        <button id="new-group"><i class="fas fa-users"></i></button>
      </div>
      <div id="contacts-list"></div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="current-chat-name">
        <button id="back-to-contacts"><i class="fas fa-arrow-left"></i></button>
        <span id="chat-with-title">...</span>
        <span id="typingIndicator" style="margin-left: auto;"></span>
        <button id="pinInfo" style="background:transparent; border:none;"><i class="fas fa-thumbtack"></i></button>
      </div>
      <div id="messages"></div>
      <div class="chat-input-row">
        <label class="attach-btn"><i class="fas fa-paperclip"></i>
          <input type="file" id="fileUpload" accept="image/*,video/*" hidden>
        </label>
        <button id="record-btn"><i class="fas fa-microphone"></i></button>
        <input type="text" id="msg-input" placeholder="сообщение...">
        <button id="btn-send"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- Панель действий при клике на сообщение -->
  <div class="action-bar" id="actionBar">
    <button id="reactLove">❤️</button>
    <button id="reactLaugh">😂</button>
    <button id="reactWow">😮</button>
    <button id="reactSad">😢</button>
    <button id="copyMsg"><i class="fas fa-copy"></i></button>
    <button id="forwardMsg"><i class="fas fa-share"></i></button>
    <button id="pinMsg"><i class="fas fa-thumbtack"></i></button>
  </div>

  <!-- Модальное окно для полноэкранного просмотра -->
  <div class="modal" id="mediaModal">
    <span style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer;" id="closeModal">&times;</span>
    <div id="modalContent"></div>
  </div>

  <script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onChildAdded, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqy8OpoabzNS1z_YaPTzG3siiyfTDvzzo",
      authDomain: "aether-messenger-cafc9.firebaseapp.com",
      databaseURL: "https://aether-messenger-cafc9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "aether-messenger-cafc9",
      storageBucket: "aether-messenger-cafc9.firebasestorage.app",
      messagingSenderId: "659803996890",
      appId: "1:659803996890:web:d90d9489bfa658a32ddbe3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Состояние ---
    let myNick = '';
    let activeChat = null; // { id, type, participants }
    let messagesUnsubscribe = null;
    let contactsUnsubscribe = null;
    let typingTimeout = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let selectedMsgId = null; // для action bar
    let forwardQueue = null; // для пересылки

    // DOM
    const authScreen = document.getElementById('auth-screen');
    const mainWrapper = document.getElementById('main-wrapper');
    const contactsDiv = document.getElementById('contacts-list');
    const messagesDiv = document.getElementById('messages');
    const chatTitle = document.getElementById('chat-with-title');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('btn-send');
    const searchInput = document.getElementById('search-user');
    const searchBtn = document.getElementById('btn-search');
    const backBtn = document.getElementById('back-to-contacts');
    const chatArea = document.getElementById('chatArea');
    const sidebar = document.getElementById('sidebar');
    const fileUpload = document.getElementById('fileUpload');
    const recordBtn = document.getElementById('record-btn');
    const newGroupBtn = document.getElementById('new-group');
    const typingSpan = document.getElementById('typingIndicator');
    const themeBtn = document.getElementById('themeBtn');
    const themePanel = document.getElementById('themePanel');
    const textColorInput = document.getElementById('textColor');
    const wallpaperUpload = document.getElementById('wallpaperUpload');
    const actionBar = document.getElementById('actionBar');
    const pinInfo = document.getElementById('pinInfo');
    const mediaModal = document.getElementById('mediaModal');
    const modalContent = document.getElementById('modalContent');
    const closeModal = document.getElementById('closeModal');

    // --- Вспомогательные функции ---
    function getAvatarColor(nick) {
      let hash = 0;
      for (let i = 0; i < nick.length; i++) hash = nick.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash % 360)}, 70%, 55%)`;
    }

    // --- Загрузка аватарок (кэш) ---
    const avatarCache = new Map();
    async function loadAvatar(nick) {
      if (avatarCache.has(nick)) return avatarCache.get(nick);
      const snap = await get(ref(db, `users/${nick}/avatar`));
      const url = snap.val();
      avatarCache.set(nick, url);
      return url;
    }

    // --- Настройка темы (обои, цвет текста) ---
    function applyTheme() {
      const savedWall = localStorage.getItem('wallpaper') || 'none';
      const savedColor = localStorage.getItem('textColor') || '#f0f4ff';
      document.body.style.setProperty('--wallpaper', savedWall === 'none' ? 'var(--bg-gradient)' : savedWall);
      document.body.style.setProperty('--text-primary', savedColor);
    }
    applyTheme();

    themeBtn.onclick = () => themePanel.classList.toggle('show');

    document.querySelectorAll('.wallpaper-option').forEach(el => {
      el.onclick = () => {
        const wall = el.dataset.wall;
        localStorage.setItem('wallpaper', wall);
        applyTheme();
      };
    });

    textColorInput.oninput = (e) => {
      localStorage.setItem('textColor', e.target.value);
      applyTheme();
    };

    wallpaperUpload.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          localStorage.setItem('wallpaper', `url('${ev.target.result}')`);
          applyTheme();
        };
        reader.readAsDataURL(file);
      }
    };

    // --- Полноэкранный просмотр ---
    function openMedia(src, type) {
      modalContent.innerHTML = type === 'video' ? `<video src="${src}" controls autoplay></video>` : `<img src="${src}">`;
      mediaModal.style.display = 'flex';
    }
    closeModal.onclick = () => mediaModal.style.display = 'none';
    mediaModal.onclick = (e) => { if (e.target === mediaModal) mediaModal.style.display = 'none'; };

    // --- Отрисовка сообщения (с поддержкой pin, реакций, клика по медиа) ---
    function drawMessage(msg, isMe) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
      msgDiv.dataset.id = msg.id;
      msgDiv.dataset.from = msg.from;
      msgDiv.dataset.text = msg.text || '';

      // Если сообщение закреплено, добавляем класс
      if (msg.pinned) msgDiv.classList.add('pinned');

      if (!isMe) {
        const ava = document.createElement('div');
        ava.className = 'avatar-bubble';
        loadAvatar(msg.from).then(url => {
          if (url) ava.style.backgroundImage = `url('${url}')`;
          else ava.style.background = getAvatarColor(msg.from);
          ava.textContent = msg.from.charAt(0).toUpperCase();
        });
        msgDiv.appendChild(ava);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble-content';

      // Reply context (если есть)
      if (msg.replyTo) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'reply-context';
        replyDiv.innerHTML = `<i class="fas fa-reply"></i> ${msg.replyTo.from}: ${msg.replyTo.text.substring(0,30)}...`;
        bubble.appendChild(replyDiv);
      }

      const textDiv = document.createElement('div');
      textDiv.className = 'bubble-text';
      if (msg.image) {
        const img = document.createElement('img');
        img.src = msg.image;
        img.onclick = () => openMedia(msg.image, 'image');
        textDiv.appendChild(img);
      } else if (msg.video) {
        const video = document.createElement('video');
        video.src = msg.video;
        video.controls = true;
        video.style.maxWidth = '200px';
        video.onclick = (e) => { e.stopPropagation(); openMedia(msg.video, 'video'); };
        textDiv.appendChild(video);
      } else {
        textDiv.textContent = msg.text || '';
      }

      const timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

      // Реакции
      const reactionsDiv = document.createElement('div');
      reactionsDiv.className = 'reactions';
      if (msg.reactions) {
        for (let [emoji, users] of Object.entries(msg.reactions)) {
          const span = document.createElement('span');
          span.className = 'reaction';
          span.textContent = `${emoji} ${users.length}`;
          span.onclick = (e) => { e.stopPropagation(); toggleReaction(msg.id, emoji); };
          reactionsDiv.appendChild(span);
        }
      }

      bubble.appendChild(textDiv);
      bubble.appendChild(timeDiv);
      bubble.appendChild(reactionsDiv);
      msgDiv.appendChild(bubble);

      // Клик по сообщению для вызова action bar
      msgDiv.onclick = (e) => {
        e.stopPropagation();
        if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') return;
        selectedMsgId = msg.id;
        // Позиционировать панель рядом с сообщением
        const rect = msgDiv.getBoundingClientRect();
        actionBar.style.left = rect.left + rect.width/2 + 'px';
        actionBar.style.bottom = (window.innerHeight - rect.top) + 40 + 'px';
        actionBar.style.display = 'flex';
        // Сохраняем данные сообщения для кнопок
        window.currentMsg = msg;
      };

      return msgDiv;
    }

    // --- Реакции ---
    async function toggleReaction(msgId, emoji) {
      if (!activeChat) return;
      const reactionRef = ref(db, `chats/${activeChat.id}/messages/${msgId}/reactions/${emoji}`);
      const snap = await get(reactionRef);
      let users = snap.val() || [];
      if (users.includes(myNick)) {
        users = users.filter(u => u !== myNick);
      } else {
        users.push(myNick);
      }
      await set(reactionRef, users);
    }

    // --- Копирование текста ---
    document.getElementById('copyMsg').onclick = () => {
      if (window.currentMsg && window.currentMsg.text) {
        navigator.clipboard.writeText(window.currentMsg.text);
      }
      actionBar.style.display = 'none';
    };

    // --- Пересылка ---
    document.getElementById('forwardMsg').onclick = () => {
      if (window.currentMsg) {
        forwardQueue = window.currentMsg; // сохраняем сообщение
        alert('Выберите чат для пересылки из списка контактов');
        // можно подсветить контакты
        actionBar.style.display = 'none';
      }
    };

    // При клике на контакт, если есть forwardQueue, отправляем
    function forwardToChat(chatId, participants) {
      if (!forwardQueue) return;
      const msg = {
        from: myNick,
        time: Date.now(),
        text: forwardQueue.text,
        image: forwardQueue.image,
        video: forwardQueue.video,
        forwarded: true,
        originalFrom: forwardQueue.from
      };
      push(ref(db, `chats/${chatId}/messages`), msg);
      forwardQueue = null;
    }

    // --- Закрепление ---
    document.getElementById('pinMsg').onclick = async () => {
      if (!activeChat || !window.currentMsg) return;
      const msgId = window.currentMsg.id;
      // Сначала снимем старое закрепление, если есть
      const chatRef = ref(db, `chats/${activeChat.id}`);
      const snap = await get(chatRef);
      const data = snap.val() || {};
      if (data.pinnedMessage === msgId) {
        await update(chatRef, { pinnedMessage: null });
      } else {
        await update(chatRef, { pinnedMessage: msgId });
      }
      actionBar.style.display = 'none';
    };

    // Показать информацию о закреплённом
    pinInfo.onclick = async () => {
      if (!activeChat) return;
      const snap = await get(ref(db, `chats/${activeChat.id}/pinnedMessage`));
      const pinnedId = snap.val();
      if (pinnedId) {
        alert('Закреплённое сообщение ID: ' + pinnedId);
        // Можно подсветить
      } else {
        alert('Нет закреплённых сообщений');
      }
    };

    // --- Кнопки реакций в action bar ---
    document.getElementById('reactLove').onclick = () => { if (selectedMsgId) toggleReaction(selectedMsgId, '❤️'); actionBar.style.display = 'none'; };
    document.getElementById('reactLaugh').onclick = () => { if (selectedMsgId) toggleReaction(selectedMsgId, '😂'); actionBar.style.display = 'none'; };
    document.getElementById('reactWow').onclick = () => { if (selectedMsgId) toggleReaction(selectedMsgId, '😮'); actionBar.style.display = 'none'; };
    document.getElementById('reactSad').onclick = () => { if (selectedMsgId) toggleReaction(selectedMsgId, '😢'); actionBar.style.display = 'none'; };

    // --- Загрузка чата (исправлено двойное отображение) ---
    function loadChat(chatId, participants) {
      if (messagesUnsubscribe) messagesUnsubscribe();
      messagesDiv.innerHTML = ''; // Очищаем перед загрузкой

      const messagesRef = ref(db, `chats/${chatId}/messages`);
      // Сначала грузим все существующие (один раз)
      get(messagesRef).then(snap => {
        const msgs = snap.val();
        if (msgs) {
          Object.entries(msgs).forEach(([id, msg]) => {
            messagesDiv.appendChild(drawMessage({ id, ...msg }, msg.from === myNick));
          });
        }
        scrollToBottom();
      });

      // Затем слушаем новые (не будет дублей, т.к. мы не очищаем при добавлении)
      messagesUnsubscribe = onChildAdded(messagesRef, (snap) => {
        const msg = { id: snap.key, ...snap.val() };
        // Проверка на дубликат (если вдруг)
        if (!document.querySelector(`[data-id="${msg.id}"]`)) {
          messagesDiv.appendChild(drawMessage(msg, msg.from === myNick));
          scrollIfNeeded();
        }
      });

      // Слушаем изменения закрепления
      onValue(ref(db, `chats/${chatId}/pinnedMessage`), (snap) => {
        const pinnedId = snap.val();
        document.querySelectorAll('.msg').forEach(el => el.classList.remove('pinned'));
        if (pinnedId) {
          const pinnedEl = document.querySelector(`[data-id="${pinnedId}"]`);
          if (pinnedEl) pinnedEl.classList.add('pinned');
        }
      });
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function scrollIfNeeded() {
      if (messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < 100) scrollToBottom();
    }

    // --- Контакты (адаптировано для пересылки) ---
    function loadContacts() {
      if (!myNick) return;
      if (contactsUnsubscribe) contactsUnsubscribe();

      const contactsRef = ref(db, `users/${myNick}/contacts`);
      contactsUnsubscribe = onValue(contactsRef, async (snap) => {
        const contacts = snap.val() || {};
        let html = '';
        for (let [id, data] of Object.entries(contacts)) {
          const isGroup = data.isGroup;
          const name = isGroup ? (data.groupName || id) : id;
          const avatarUrl = isGroup ? null : await loadAvatar(id);
          const statusSnap = isGroup ? null : await get(ref(db, `status/${id}`));
          const online = statusSnap?.val() === 'online';
          html += `
            <div class="contact-item" data-id="${id}" data-type="${isGroup ? 'group' : 'private'}">
              <div class="contact-avatar" style="${avatarUrl ? `background-image:url('${avatarUrl}')` : `background:${getAvatarColor(id)}`}">
                ${!avatarUrl ? name.charAt(0).toUpperCase() : ''}
                ${online ? '<span class="online-indicator"></span>' : ''}
              </div>
              <div class="contact-info">
                <div><strong>${name}</strong></div>
                <div style="font-size:0.8rem;">${data.lastMsg || ''}</div>
              </div>
            </div>
          `;
        }
        contactsDiv.innerHTML = html || '<div style="padding:20px;">Нет контактов</div>';
        document.querySelectorAll('.contact-item').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id;
            const type = el.dataset.type;
            if (forwardQueue) {
              // Пересылаем в этот чат
              const chatId = type === 'private' ? [myNick, id].sort().join('_') : id;
              forwardToChat(chatId, [myNick, id]); // упрощённо
              forwardQueue = null;
              alert('Сообщение переслано');
            } else {
              if (type === 'private') startPrivateChat(id);
              else startGroupChat(id);
            }
          });
        });
      });
    }

    // --- Старт приватного чата ---
    function startPrivateChat(partner) {
      const chatId = [myNick, partner].sort().join('_');
      activeChat = { id: chatId, type: 'private', participants: [myNick, partner] };
      chatTitle.innerText = `@${partner}`;
      loadChat(chatId, [myNick, partner]);
      if (window.innerWidth <= 700) {
        sidebar.style.transform = 'translateX(-100%)';
        chatArea.classList.add('active');
      }
    }

    function startGroupChat(groupId) {
      get(ref(db, `chats/${groupId}`)).then(snap => {
        const data = snap.val();
        activeChat = { id: groupId, type: 'group', participants: data.participants, name: data.name };
        chatTitle.innerText = data.name || 'Группа';
        loadChat(groupId, data.participants);
      });
    }

    // --- Отправка сообщения ---
    async function sendMessage(content) {
      if (!activeChat) return;
      const msg = {
        from: myNick,
        time: Date.now(),
        ...content
      };
      await push(ref(db, `chats/${activeChat.id}/messages`), msg);
      // Обновить последнее сообщение у контактов
      const lastMsg = content.text || (content.image ? '📷' : (content.video ? '🎥' : ''));
      for (let p of activeChat.participants) {
        if (p !== myNick) {
          await update(ref(db, `users/${p}/contacts/${myNick}`), { lastMsg, lastTime: Date.now() });
        }
      }
    }

    // --- Поиск сообщений (исправлено двойное отображение) ---
    document.getElementById('search-messages')?.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.msg').forEach(msg => {
        const text = msg.dataset.text?.toLowerCase() || '';
        msg.style.display = text.includes(query) ? 'flex' : 'none';
      });
    });

    // --- Остальной код (авторизация, медиа, группы и т.д.) ---
    document.getElementById('btn-login').onclick = async () => {
      const nick = document.getElementById('auth-nick').value.toLowerCase().trim();
      const pass = document.getElementById('auth-pass').value;
      if (!nick || !pass) return;
      const userRef = ref(db, 'users/' + nick);
      const snap = await get(userRef);
      if (snap.exists()) {
        if (snap.val().password !== pass) return alert('Неверный пароль');
      } else {
        await set(userRef, { password: pass, nickname: nick });
      }
      myNick = nick;
      authScreen.style.display = 'none';
      mainWrapper.style.display = 'flex';
      loadContacts();
      // Presence
      set(ref(db, `status/${myNick}`), 'online');
      onDisconnect(ref(db, `status/${myNick}`)).set('offline');
    };

    searchBtn.onclick = async () => {
      const target = searchInput.value.trim().toLowerCase();
      if (!target || target === myNick) return;
      const snap = await get(ref(db, 'users/' + target));
      if (snap.exists()) startPrivateChat(target);
      else alert('Не найден');
    };

    newGroupBtn.onclick = async () => {
      const name = prompt('Название группы');
      const members = prompt('Участники (через запятую)');
      if (!members) return;
      const participants = members.split(',').map(s => s.trim()).concat(myNick);
      const groupId = 'group_' + Date.now();
      await set(ref(db, `chats/${groupId}`), { type: 'group', name, participants });
      for (let p of participants) {
        await set(ref(db, `users/${p}/contacts/${groupId}`), { isGroup: true, groupName: name, lastMsg: '', lastTime: Date.now() });
      }
      startGroupChat(groupId);
    };

    sendBtn.onclick = () => {
      const text = msgInput.value.trim();
      if (text) {
        sendMessage({ text });
        msgInput.value = '';
      }
    };

    fileUpload.onchange = () => {
      const file = fileUpload.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        if (file.type.startsWith('image/')) sendMessage({ image: e.target.result });
        else if (file.type.startsWith('video/')) sendMessage({ video: e.target.result });
      };
      reader.readAsDataURL(file);
      fileUpload.value = '';
    };

    recordBtn.onclick = async () => {
      if (!mediaRecorder) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = () => sendMessage({ audio: reader.result });
            reader.readAsDataURL(blob);
            audioChunks = [];
          };
          mediaRecorder.start();
          recordBtn.classList.add('recording');
        } catch (e) { alert('Микрофон недоступен'); }
      } else {
        mediaRecorder.stop();
        mediaRecorder = null;
        recordBtn.classList.remove('recording');
      }
    };

    backBtn.onclick = () => {
      sidebar.style.transform = 'translateX(0)';
      chatArea.classList.remove('active');
    };
  </script>
</body>
