<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aether · Creator Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f19;
      transition: background 0.3s, color 0.3s;
    }

    body {
      --bg-primary: #0b0f19;
      --bg-surface: #151f2f;
      --bg-surface-light: #1e2a3a;
      --text-primary: #f0f4ff;
      --text-secondary: #a0b3d9;
      --accent: #6366f1;
      --accent-hover: #8183f4;
      --border-color: rgba(255,255,255,0.08);
      --shadow: 0 8px 24px rgba(0,0,0,0.5);
      --wallpaper: none;
      color: var(--text-primary);
    }

    body.light {
      --bg-primary: #f0f4ff;
      --bg-surface: #ffffff;
      --bg-surface-light: #eef2f8;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --accent: #6366f1;
      --accent-hover: #4f52e0;
      --border-color: rgba(0,0,0,0.08);
      --shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    body.wallpaper-custom {
      background-image: var(--wallpaper) !important;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Стиль для создателя */
    .creator-badge {
      color: gold;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(255,215,0,0.5);
      margin-left: 6px;
      font-size: 0.9rem;
    }

    #auth-screen {
      width: 100%;
      max-width: 400px;
      background: var(--bg-surface);
      border-radius: 32px;
      padding: 32px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    #auth-screen h2 {
      font-weight: 500;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    input, button {
      width: 100%;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface-light);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    button {
      background: var(--accent);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    #main-wrapper {
      display: none;
      width: 100%;
      height: 100vh;
      max-height: 95vh;
      border-radius: 32px;
      overflow: hidden;
      background: var(--bg-surface);
      box-shadow: var(--shadow);
      margin: 16px;
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
    }

    .sidebar {
      width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .chat-area {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      background-size: cover;
    }

    .profile-name {
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .profile-status {
      font-size: 14px;
      color: var(--text-secondary);
    }

    #themeToggle {
      background: transparent;
      border: 1px solid var(--border-color);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      cursor: pointer;
    }

    .search-box {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      background: var(--bg-surface-light);
    }

    .search-box button {
      width: 48px;
      padding: 0;
      border-radius: 50%;
    }

    #contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .contact-item:hover {
      background: var(--bg-surface-light);
    }

    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      color: white;
      position: relative;
    }

    .online-indicator {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ade80;
      border: 2px solid var(--bg-surface);
    }

    .contact-info {
      flex: 1;
      min-width: 0;
    }

    .contact-name {
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
    }

    .contact-last-msg {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #back-to-contacts {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
    }

    #chat-with-title {
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #typingIndicator {
      margin-left: auto;
      font-size: 14px;
      color: var(--accent);
    }

    .chat-search {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
    }

    .chat-search input {
      flex: 1;
      background: var(--bg-surface-light);
    }

    .chat-search button {
      width: 48px;
      padding: 0;
      border-radius: 50%;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      display: flex;
      max-width: 70%;
      animation: popIn 0.2s ease;
      position: relative;
    }

    .msg.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.received {
      align-self: flex-start;
    }

    .msg.pinned {
      border: 2px solid var(--accent);
      border-radius: 24px;
    }

    .avatar-bubble {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      margin: 0 8px;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: white;
    }

    .bubble-content {
      background: var(--bg-surface-light);
      padding: 10px 16px;
      border-radius: 22px;
      word-break: break-word;
    }

    .msg.sent .bubble-content {
      background: var(--accent);
    }

    .bubble-text img, .bubble-text video {
      max-width: 200px;
      border-radius: 12px;
      cursor: pointer;
    }

    .bubble-text audio {
      max-width: 200px;
      height: 40px;
      display: block;
    }

    .msg-time {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }

    .reactions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .reaction {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2px 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .reply-context {
      font-size: 0.8rem;
      opacity: 0.7;
      padding: 4px 8px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      margin-bottom: 4px;
    }

    .forward-badge {
      font-size: 0.7rem;
      background: var(--accent);
      border-radius: 12px;
      padding: 2px 8px;
      margin-left: 8px;
    }

    /* Панель действий (с прокруткой) */
    .action-bar {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 40px;
      z-index: 1000;
      display: none;
      background: var(--bg-surface);
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      max-width: 90vw;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }

    .action-bar button {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      padding: 8px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .action-bar button:hover {
      background: var(--bg-surface-light);
    }

    /* Модальные окна */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      display: none;
    }

    .modal-content {
      background: var(--bg-surface);
      border-radius: 32px;
      padding: 32px;
      max-width: 90%;
      max-height: 90%;
      overflow: auto;
    }

    .profile-modal {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: white;
    }

    .theme-panel {
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wallpaper-option {
      width: 100%;
      height: 60px;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid transparent;
      background-size: cover;
    }

    .wallpaper-option.selected {
      border-color: var(--accent);
    }

    .group-settings, .user-profile-view {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
    }

    @media (max-width: 700px) {
      #main-wrapper {
        margin: 0;
        border-radius: 0;
        max-height: 100vh;
      }
      .sidebar {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(0);
        z-index: 5;
      }
      .chat-area {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 10;
      }
      .chat-area.active {
        transform: translateX(0);
      }
      #back-to-contacts {
        display: inline-block !important;
      }
      .action-bar {
        bottom: 80px;
        padding: 4px 8px;
      }
      .action-bar button {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }
    }

    @keyframes popIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Экран авторизации -->
  <div id="auth-screen">
    <h2><i class="fas fa-cube" style="color: #6366f1;"></i> AETHER</h2>
    <input type="text" id="auth-nick" placeholder="никнейм" autocomplete="off">
    <input type="password" id="auth-pass" placeholder="пароль">
    <button id="btn-login"><i class="fas fa-key"></i> Войти / Создать</button>
  </div>

  <!-- Основное приложение -->
  <div id="main-wrapper">
    <div class="app-container">
      <!-- Левая панель (контакты) -->
      <div class="sidebar" id="sidebar">
        <div class="profile-header">
          <div class="profile-info" id="profileBtn">
            <div class="avatar" id="headerAvatar">?</div>
            <div>
              <div class="profile-name" id="headerName">Загрузка...</div>
              <div class="profile-status">online</div>
            </div>
          </div>
          <div id="themeToggle"><i class="fas fa-palette"></i></div>
        </div>

        <div class="search-box">
          <input type="text" id="search-user" placeholder="Поиск контактов...">
          <button id="btn-search"><i class="fas fa-search"></i></button>
          <button id="new-group"><i class="fas fa-users"></i></button>
        </div>

        <div id="contacts-list"></div>
      </div>

      <!-- Правая панель (чат) -->
      <div class="chat-area" id="chatArea">
        <div class="chat-header">
          <button id="back-to-contacts"><i class="fas fa-arrow-left"></i></button>
          <span id="chat-with-title">Выберите чат</span>
          <span id="typingIndicator"></span>
          <button id="pinInfo" style="background:transparent; border:none; color:var(--text-primary);"><i class="fas fa-thumbtack"></i></button>
          <button id="groupSettingsBtn" style="background:transparent; border:none; color:var(--text-primary); display:none;"><i class="fas fa-cog"></i></button>
        </div>

        <!-- Поиск по сообщениям -->
        <div class="chat-search">
          <input type="text" id="search-messages" placeholder="Поиск в чате...">
          <button id="clearSearch"><i class="fas fa-times"></i></button>
        </div>

        <div id="messages"></div>

        <!-- Панель ввода -->
        <div style="display:flex; gap:12px; padding:16px 24px; border-top:1px solid var(--border-color);">
          <label style="width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface-light); border-radius:50%; cursor:pointer;">
            <i class="fas fa-paperclip"></i>
            <input type="file" id="fileUpload" accept="image/*,video/*,audio/*" hidden>
          </label>
          <button id="record-btn" style="width:48px; height:48px; border-radius:50%; background:var(--bg-surface-light);"><i class="fas fa-microphone"></i></button>
          <input type="text" id="msg-input" placeholder="Сообщение..." style="flex:1; background:var(--bg-surface-light);">
          <button id="btn-send" style="width:48px; height:48px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Панель действий над сообщением (с прокруткой) -->
  <div class="action-bar" id="actionBar">
    <button id="reactLove" title="❤️">❤️</button>
    <button id="reactLaugh" title="😂">😂</button>
    <button id="reactWow" title="😮">😮</button>
    <button id="reactSad" title="😢">😢</button>
    <button id="replyMsg" title="Ответить"><i class="fas fa-reply"></i></button>
    <button id="copyMsg" title="Копировать"><i class="fas fa-copy"></i></button>
    <button id="forwardMsg" title="Переслать"><i class="fas fa-share"></i></button>
    <button id="pinMsg" title="Закрепить"><i class="fas fa-thumbtack"></i></button>
    <button id="deleteMsg" title="Удалить"><i class="fas fa-trash"></i></button>
  </div>

  <!-- Модальное окно профиля (свой) -->
  <div class="modal" id="profileModal">
    <div class="modal-content profile-modal">
      <h2>Профиль</h2>
      <div class="avatar-large" id="profileAvatar">?</div>
      <input type="text" id="profileName" placeholder="Отображаемое имя">
      <input type="file" id="avatarUpload" accept="image/*">
      <button id="saveProfile">Сохранить</button>
      <button id="closeProfile">Закрыть</button>
    </div>
  </div>

  <!-- Модальное окно просмотра чужого профиля -->
  <div class="modal" id="userProfileModal">
    <div class="modal-content profile-modal">
      <h2 id="viewProfileTitle">Профиль пользователя</h2>
      <div class="avatar-large" id="viewProfileAvatar">?</div>
      <div><strong>Имя:</strong> <span id="viewProfileName"></span></div>
      <div><strong>Ник:</strong> <span id="viewProfileNick"></span></div>
      <div><strong>Роль:</strong> <span id="viewProfileRole"></span></div>
      <div><strong>Дата регистрации:</strong> <span id="viewProfileDate"></span></div>
      <button id="closeUserProfile">Закрыть</button>
      <button id="banUserBtn" style="background:#ef4444; display:none;">Забанить</button>
    </div>
  </div>

  <!-- Модальное окно настроек группы -->
  <div class="modal" id="groupSettingsModal">
    <div class="modal-content group-settings">
      <h2>Настройки группы</h2>
      <input type="text" id="groupNameInput" placeholder="Название группы">
      <h3>Участники</h3>
      <div id="participantsList"></div>
      <input type="text" id="addParticipantInput" placeholder="Ник для добавления">
      <button id="addParticipantBtn">Добавить участника</button>
      <button id="saveGroupSettings">Сохранить</button>
      <button id="closeGroupSettings">Закрыть</button>
    </div>
  </div>

  <!-- Модальное окно для бана (только для создателя) -->
  <div class="modal" id="banModal">
    <div class="modal-content" style="width:300px;">
      <h3>Управление баном</h3>
      <p id="banUserInfo"></p>
      <button id="confirmBan" style="background:#ef4444;">Забанить</button>
      <button id="closeBan">Отмена</button>
    </div>
  </div>

  <!-- Модальное окно настроек темы -->
  <div class="modal" id="themeModal">
    <div class="modal-content theme-panel">
      <h3>Настройки темы</h3>
      <div style="display:flex; gap:8px;">
        <button id="themeDark">Тёмная</button>
        <button id="themeLight">Светлая</button>
      </div>
      <h4>Цвет текста</h4>
      <input type="color" id="textColor" value="#f0f4ff">
      <h4>Обои</h4>
      <div class="wallpaper-option" style="background: #0b0f19;" data-wall="none"></div>
      <div class="wallpaper-option" style="background: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=300') center/cover;" data-wall="url('https://images.unsplash.com/photo-1557683316-973673baf926?w=300')"></div>
      <div class="wallpaper-option" style="background: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=300') center/cover;" data-wall="url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=300')"></div>
      <input type="file" id="wallpaperUpload" accept="image/*">
      <button id="closeTheme">Закрыть</button>
    </div>
  </div>

  <!-- Модальное окно для полноэкранного просмотра медиа -->
  <div class="modal" id="mediaModal">
    <div class="modal-content" style="background:transparent; padding:0; max-width:90%; max-height:90%;">
      <span style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer; color:white;" id="closeModal">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>

  <script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onChildAdded, onValue, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqy8OpoabzNS1z_YaPTzG3siiyfTDvzzo",
      authDomain: "aether-messenger-cafc9.firebaseapp.com",
      databaseURL: "https://aether-messenger-cafc9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "aether-messenger-cafc9",
      storageBucket: "aether-messenger-cafc9.firebasestorage.app",
      messagingSenderId: "659803996890",
      appId: "1:659803996890:web:d90d9489bfa658a32ddbe3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Состояние ---
    let myNick = '';
    let myDisplayName = '';
    let activeChat = null; // { id, type, participants, name? }
    let messagesUnsubscribe = null;
    let contactsUnsubscribe = null;

    function applyTheme() {

      document.body.style.setProperty('--wallpaper', savedWall === 'none' ? 'var(--bg-gradient)' : savedWall);

      if (savedWall !== 'none') {

    // --- Функции для работы с профилем ---
    async function loadProfile() {
      if (!myNick) return;
      const snap = await get(ref(db, `users/${myNick}`));
      const data = snap.val() || {};
      myDisplayName = data.displayName || myNick;
      headerName.innerHTML = myDisplayName;
      if (isCreator) {
        headerName.innerHTML += '<span class="creator-badge">Создатель💫</span>';
      }
      if (data.avatar) {
        headerAvatar.style.backgroundImage = `url('${data.avatar}')`;
        headerAvatar.textContent = '';
      } else {
        headerAvatar.style.backgroundImage = '';
        headerAvatar.style.background = getAvatarColor(myNick);
        headerAvatar.textContent = myNick.charAt(0).toUpperCase();
      }
    }

    function getAvatarColor(nick) {
      let hash = 0;
      for (let i = 0; i < nick.length; i++) hash = nick.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash % 360)}, 70%, 55%)`;
    }

    const avatarCache = new Map();
    async function loadAvatar(nick) {
      if (avatarCache.has(nick)) return avatarCache.get(nick);
      const snap = await get(ref(db, `users/${nick}/avatar`));
      const url = snap.val();
      avatarCache.set(nick, url);
      return url;
    }

    // --- Просмотр профиля пользователя (по клику на аватар в сообщении или контакте) ---
    async function showUserProfile(nick) {
      const snap = await get(ref(db, `users/${nick}`));
      const data = snap.val() || {};
      const avatarUrl = await loadAvatar(nick);
      if (avatarUrl) {
        viewProfileAvatar.style.backgroundImage = `url('${avatarUrl}')`;
        viewProfileAvatar.textContent = '';
      } else {
        viewProfileAvatar.style.backgroundImage = '';
        viewProfileAvatar.style.background = getAvatarColor(nick);
        viewProfileAvatar.textContent = nick.charAt(0).toUpperCase();
      }
      viewProfileName.textContent = data.displayName || nick;
      viewProfileNick.textContent = nick;
      const role = nick === 'hard' ? 'Создатель💫' : (data.admin ? 'Админ' : 'Пользователь');
      viewProfileRole.textContent = role;
      viewProfileDate.textContent = data.registered ? new Date(data.registered).toLocaleDateString() : 'неизвестно';
      
      // Для создателя показываем кнопку бана
      if (isCreator && nick !== myNick) {
        banUserBtn.style.display = 'block';
        banUserBtn.onclick = () => {
          banUserInfo.textContent = `Забанить пользователя ${nick}?`;

            banModal.style.display = 'none';
            userProfileModal.style.display = 'none';

        banUserBtn.style.display = 'none';
      }

    closeBan.onclick = () => banModal.style.display = 'none';

    // --- Полноэкранный просмотр ---
    function openMedia(src, type) {
      modalContent.innerHTML = type === 'video' ? `<video src="${src}" controls autoplay style="max-width:100%; max-height:80vh;"></video>` : `<img src="${src}" style="max-width:100%; max-height:80vh;">`;
      mediaModal.style.display = 'flex';
    }

    mediaModal.onclick = (e) => { if (e.target === mediaModal) mediaModal.style.display = 'none'; };

    // --- Отрисовка сообщения с поддержкой удаления ---
    function drawMessage(msg, isMe) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
      msgDiv.dataset.id = msg.id;
      msgDiv.dataset.from = msg.from;
      msgDiv.dataset.text = msg.text || '';

      if (msg.pinned) msgDiv.classList.add('pinned');

      if (!isMe) {
        const ava = document.createElement('div');
        ava.className = 'avatar-bubble';
        loadAvatar(msg.from).then(url => {
          if (url) ava.style.backgroundImage = `url('${url}')`;
          else ava.style.background = getAvatarColor(msg.from);
          ava.textContent = msg.from.charAt(0).toUpperCase();
        });
        ava.onclick = (e) => { e.stopPropagation(); showUserProfile(msg.from); };
        msgDiv.appendChild(ava);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble-content';

      if (msg.replyTo) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'reply-context';
        replyDiv.innerHTML = `<i class="fas fa-reply"></i> ${msg.replyTo.from}: ${msg.replyTo.text.substring(0,30)}...`;
        bubble.appendChild(replyDiv);
      }

      if (msg.forwarded) {
        const fwd = document.createElement('span');
        fwd.className = 'forward-badge';
        fwd.textContent = '📨 переслано';
        bubble.appendChild(fwd);
      }

      const textDiv = document.createElement('div');
      textDiv.className = 'bubble-text';
      if (msg.image) {
        const img = document.createElement('img');
        img.src = msg.image;
        img.onclick = (e) => { e.stopPropagation(); openMedia(msg.image, 'image'); };
        textDiv.appendChild(img);
      } else if (msg.video) {
        const video = document.createElement('video');
        video.src = msg.video;
        video.controls = true;
        video.style.maxWidth = '200px';
        video.onclick = (e) => { e.stopPropagation(); openMedia(msg.video, 'video'); };
        textDiv.appendChild(video);
      } else if (msg.audio) {
        const audio = document.createElement('audio');
        audio.src = msg.audio;
        audio.controls = true;
        audio.style.width = '200px';
        textDiv.appendChild(audio);
      } else {
        textDiv.textContent = msg.text || '';
      }

      const timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

      const reactionsDiv = document.createElement('div');
      reactionsDiv.className = 'reactions';
      if (msg.reactions) {
        for (let [emoji, users] of Object.entries(msg.reactions)) {
          const span = document.createElement('span');
          span.className = 'reaction';
          span.textContent = `${emoji} ${users.length}`;
          span.onclick = (e) => { e.stopPropagation(); toggleReaction(msg.id, emoji); };
          reactionsDiv.appendChild(span);
        }
      }

      bubble.appendChild(textDiv);
      bubble.appendChild(timeDiv);
      bubble.appendChild(reactionsDiv);
      msgDiv.appendChild(bubble);

      // Клик для вызова action bar
      msgDiv.onclick = (e) => {
        e.stopPropagation();
        if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO') return;
        selectedMsgId = msg.id;
        currentMsg = msg;
        const rect = msgDiv.getBoundingClientRect();
        actionBar.style.left = rect.left + rect.width/2 + 'px';
        actionBar.style.bottom = (window.innerHeight - rect.top) + 40 + 'px';
        actionBar.style.display = 'flex';
      };

      return msgDiv;
    }

    // --- Реакции ---
    async function toggleReaction(msgId, emoji) {
      if (!activeChat) return;
      const reactionRef = ref(db, `chats/${activeChat.id}/messages/${msgId}/reactions/${emoji}`);
      const snap = await get(reactionRef);
      let users = snap.val() || [];
      if (users.includes(myNick)) {
        users = users.filter(u => u !== myNick);
      } else {
        users.push(myNick);
      }
      await set(reactionRef, users);
    }

    // --- Удаление сообщения (для всех, кто его отправил, и для создателя) ---
    async function deleteMessage(msgId) {
      if (!activeChat || !currentMsg) return;

        // Удаляем из DOM
        const msgEl = document.querySelector(`[data-id="${msgId}"]`);
        if (msgEl) msgEl.remove();
      } else {
        alert('Вы можете удалять только свои сообщения');
      }
      actionBar.style.display = 'none';
    }

    // --- Загрузка чата с предотвращением дублирования ---
    function loadChat(chatId, participants) {
      if (messagesUnsubscribe) messagesUnsubscribe();
      messagesDiv.innerHTML = '';
      messageIds.clear();

      const messagesRef = ref(db, `chats/${chatId}/messages`);
      get(messagesRef).then(snap => {
        const msgs = snap.val();
        if (msgs) {
          Object.entries(msgs).forEach(([id, msg]) => {
            if (!messageIds.has(id)) {
              messageIds.add(id);
              messagesDiv.appendChild(drawMessage({ id, ...msg }, msg.from === myNick));
            }
          });
        }
        scrollToBottom();
      });

      messagesUnsubscribe = onChildAdded(messagesRef, (snap) => {
        const id = snap.key;
        if (messageIds.has(id)) return;
        messageIds.add(id);
        const msg = { id, ...snap.val() };
        messagesDiv.appendChild(drawMessage(msg, msg.from === myNick));
        scrollIfNeeded();
      });

      onValue(ref(db, `chats/${chatId}/pinnedMessage`), (snap) => {
        const pinnedId = snap.val();
        document.querySelectorAll('.msg').forEach(el => el.classList.remove('pinned'));
        if (pinnedId) {
          const pinnedEl = document.querySelector(`[data-id="${pinnedId}"]`);
          if (pinnedEl) pinnedEl.classList.add('pinned');
        }
      });

      // Показываем кнопку настроек группы, если это группа и пользователь админ или создатель
      if (activeChat.type === 'group') {
        get(ref(db, `chats/${chatId}`)).then(snap => {
          const data = snap.val();
          if (data.admins && (data.admins.includes(myNick) || isCreator)) {
            groupSettingsBtn.style.display = 'inline-block';
          } else {
            groupSettingsBtn.style.display = 'none';
          }
        });
      } else {
        groupSettingsBtn.style.display = 'none';
      }
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function scrollIfNeeded() {
      if (messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < 100) scrollToBottom();
    }

    // --- Контакты и пересылка ---
    function loadContacts() {
      if (!myNick) return;
      if (contactsUnsubscribe) contactsUnsubscribe();

      const contactsRef = ref(db, `users/${myNick}/contacts`);
      contactsUnsubscribe = onValue(contactsRef, async (snap) => {
        const contacts = snap.val() || {};
        let html = '';
        for (let [id, data] of Object.entries(contacts)) {
          const isGroup = data.isGroup;
          const name = isGroup ? (data.groupName || id) : id;
          const avatarUrl = isGroup ? null : await loadAvatar(id);
          const statusSnap = isGroup ? null : await get(ref(db, `status/${id}`));
          const online = statusSnap?.val() === 'online';
          html += `
            <div class="contact-item" data-id="${id}" data-type="${isGroup ? 'group' : 'private'}">
              <div class="contact-avatar" style="${avatarUrl ? `background-image:url('${avatarUrl}')` : `background:${getAvatarColor(id)}`}">
                ${!avatarUrl ? name.charAt(0).toUpperCase() : ''}
                ${online ? '<span class="online-indicator"></span>' : ''}
              </div>
              <div class="contact-info">
                <div class="contact-name">
                  <span>${name}</span>
                  <span style="font-size:12px;">${data.lastTime ? new Date(data.lastTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                </div>
                <div class="contact-last-msg">${data.lastMsg || ''}</div>
              </div>
            </div>
          `;
        }
        // Для создателя добавляем специальный пункт "Мониторинг чатов"
        if (isCreator) {
          html += `
            <div class="contact-item" data-id="monitoring" data-type="monitoring">
              <div class="contact-avatar" style="background:gold;">👁️</div>
              <div class="contact-info">
                <div class="contact-name">Мониторинг чатов</div>
                <div class="contact-last-msg">Просмотр всех чатов</div>
              </div>
            </div>
          `;
        }
        contactsDiv.innerHTML = html || '<div style="padding:20px; text-align:center;">Нет контактов</div>';
        
        document.querySelectorAll('.contact-item').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id;
            const type = el.dataset.type;
            if (type === 'monitoring') {
              // Специальный режим для создателя
              alert('Режим мониторинга: выберите чат из списка всех чатов (функция в разработке)');
              return;
            }
            if (forwardQueue) {
              const chatId = type === 'private' ? [myNick, id].sort().join('_') : id;
              const msg = {
                from: myNick,
                time: Date.now(),
                text: forwardQueue.text,
                image: forwardQueue.image,
                video: forwardQueue.video,
                audio: forwardQueue.audio,
                forwarded: true,
                originalFrom: forwardQueue.from
              };
              push(ref(db, `chats/${chatId}/messages`), msg);
              forwardQueue = null;
              alert('Сообщение переслано');
            } else {
              if (type === 'private') startPrivateChat(id);
              else if (type === 'group') startGroupChat(id);
            }
          });
        });
      });
    }

    function startPrivateChat(partner) {
      const chatId = [myNick, partner].sort().join('_');
      activeChat = { id: chatId, type: 'private', participants: [myNick, partner] };
      chatTitle.innerHTML = `@${partner}`;
      loadChat(chatId, [myNick, partner]);
      if (window.innerWidth <= 700) {
        sidebar.style.transform = 'translateX(-100%)';
        chatArea.classList.add('active');
      }
    }

    function startGroupChat(groupId) {
      get(ref(db, `chats/${groupId}`)).then(snap => {
        const data = snap.val();
        activeChat = { id: groupId, type: 'group', participants: data.participants, name: data.name, admins: data.admins || [] };
        chatTitle.innerHTML = data.name || 'Группа';
        loadChat(groupId, data.participants);
      });
    }

    // --- Отправка сообщения ---
    async function sendMessage(content) {
      if (!activeChat) return;
      const msg = {
        from: myNick,
        time: Date.now(),
        ...content
      };
      if (replyTo) {
        msg.replyTo = { id: replyTo.id, from: replyTo.from, text: replyTo.text };
        replyTo = null;
        msgInput.placeholder = 'Сообщение...';
      }
      await push(ref(db, `chats/${activeChat.id}/messages`), msg);
      const lastMsg = content.text || (content.image ? '📷' : (content.video ? '🎥' : (content.audio ? '🎤' : '')));
      for (let p of activeChat.participants) {
        if (p !== myNick) {
          await update(ref(db, `users/${p}/contacts/${myNick}`), { lastMsg, lastTime: Date.now() });
        }
      }
    }

    // --- Поиск сообщений ---
    searchMessagesInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.msg').forEach(msg => {
        const text = msg.dataset.text?.toLowerCase() || '';
        msg.style.display = text.includes(query) ? 'flex' : 'none';
      });
    });
    clearSearchBtn.onclick = () => {
      searchMessagesInput.value = '';
      document.querySelectorAll('.msg').forEach(msg => msg.style.display = 'flex');
    };

    // --- Настройки группы ---
    groupSettingsBtn.onclick = async () => {
      if (!activeChat || activeChat.type !== 'group') return;
      const snap = await get(ref(db, `chats/${activeChat.id}`));
      const data = snap.val();
      groupNameInput.value = data.name || '';
      // Список участников
      let participantsHtml = '';
      for (let p of data.participants) {
        const isAdmin = data.admins && data.admins.includes(p);
        participantsHtml += `
          <div class="participant-item">
            <span>${p} ${isAdmin ? '👑' : ''}</span>
            <div>
              ${(isCreator || data.admins.includes(myNick)) && p !== myNick ? `<button class="removeParticipant" data-nick="${p}">Удалить</button>` : ''}
              ${isCreator && !isAdmin ? `<button class="makeAdmin" data-nick="${p}">Сделать админом</button>` : ''}
            </div>
          </div>
        `;
      }
      participantsList.innerHTML = participantsHtml;
      groupSettingsModal.style.display = 'flex';

      // Обработчики удаления/назначения админа
      document.querySelectorAll('.removeParticipant').forEach(btn => {
        btn.onclick = async () => {
          const nick = btn.dataset.nick;
          if (confirm(`Удалить ${nick} из группы?`)) {
            const newParticipants = data.participants.filter(p => p !== nick);
            await update(ref(db, `chats/${activeChat.id}`), { participants: newParticipants });
            // Также удалить из контактов у удалённого?
            groupSettingsModal.style.display = 'none';
          }
        };
      });
      document.querySelectorAll('.makeAdmin').forEach(btn => {
        btn.onclick = async () => {
          const nick = btn.dataset.nick;
          const admins = data.admins || [];
          if (!admins.includes(nick)) {
            admins.push(nick);
            await update(ref(db, `chats/${activeChat.id}`), { admins });
          }
          groupSettingsModal.style.display = 'none';
        };
      });
    };

    saveGroupSettings.onclick = async () => {
      const newName = groupNameInput.value.trim();
      if (newName && activeChat) {
        await update(ref(db, `chats/${activeChat.id}`), { name: newName });
        chatTitle.innerHTML = newName;
      }
      groupSettingsModal.style.display = 'none';
    };
    closeGroupSettings.onclick = () => groupSettingsModal.style.display = 'none';

    // --- Авторизация ---
    document.getElementById('btn-login').onclick = async () => {
      const nick = document.getElementById('auth-nick').value.toLowerCase().trim();
      const pass = document.getElementById('auth-pass').value;
      if (!nick || !pass) return alert('Заполните поля');
      const userRef = ref(db, 'users/' + nick);
      const snap = await get(userRef);
      if (snap.exists()) {
        if (snap.val().password !== pass) return alert('Неверный пароль');
      } else {
        // Регистрация с датой
        await set(userRef, { password: pass, nickname: nick, registered: Date.now() });
      }
      myNick = nick;
      isCreator = (myNick === 'hard');
      localStorage.setItem('aether_nick', nick);
      authScreen.style.display = 'none';
      mainWrapper.style.display = 'flex';
      await loadProfile();
      loadContacts();
      set(ref(db, `status/${myNick}`), 'online');
      onDisconnect(ref(db, `status/${myNick}`)).set('offline');
    };

    // --- Поиск пользователей ---
    searchBtn.onclick = async () => {
      const target = searchInput.value.trim().toLowerCase();
      if (!target || target === myNick) return alert('Некорректный ник');
      // Проверка на бан
      const banSnap = await get(ref(db, `bans/${target}`));
      if (banSnap.val() === true) {
        return alert('Этот пользователь забанен');
      }
      const snap = await get(ref(db, 'users/' + target));
      if (snap.exists()) startPrivateChat(target);
      else alert('Пользователь не найден');
    };

    // --- Создание группы ---
    newGroupBtn.onclick = async () => {
      const name = prompt('Название группы');
      const members = prompt('Участники (через запятую)');
      if (!members) return;
      const participants = members.split(',').map(s => s.trim()).concat(myNick);
      // Проверка на бан
      for (let p of participants) {
        const banSnap = await get(ref(db, `bans/${p}`));
        if (banSnap.val() === true) {
          alert(`Пользователь ${p} забанен и не может быть добавлен`);
          return;
        }
      }
      const groupId = 'group_' + Date.now();
      await set(ref(db, `chats/${groupId}`), { type: 'group', name, participants, admins: [myNick] });
      for (let p of participants) {
        await set(ref(db, `users/${p}/contacts/${groupId}`), { isGroup: true, groupName: name, lastMsg: '', lastTime: Date.now() });
      }
      startGroupChat(groupId);
    };

    // --- Отправка текста ---
    sendBtn.onclick = () => {
      const text = msgInput.value.trim();
      if (text) {
        sendMessage({ text });
        msgInput.value = '';
      }
    };
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

    // --- Загрузка файлов ---
    fileUpload.onchange = () => {
      const file = fileUpload.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        if (file.type.startsWith('image/')) sendMessage({ image: e.target.result });
        else if (file.type.startsWith('video/')) sendMessage({ video: e.target.result });
        else if (file.type.startsWith('audio/')) sendMessage({ audio: e.target.result });
      };
      reader.readAsDataURL(file);
      fileUpload.value = '';
    };

    // --- Голосовые сообщения ---
    recordBtn.onclick = async () => {
      if (!mediaRecorder) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = () => sendMessage({ audio: reader.result });
            reader.readAsDataURL(blob);
            audioChunks = [];
          };
          mediaRecorder.start();
          recordBtn.style.background = '#ef4444';
        } catch (e) { alert('Микрофон недоступен'); }
      } else {
        mediaRecorder.stop();
        mediaRecorder = null;
        recordBtn.style.background = '';
      }
    };

    // --- Навигация назад на мобильных ---
    backBtn.onclick = () => {
      sidebar.style.transform = 'translateX(0)';
      chatArea.classList.remove('active');
      if (messagesUnsubscribe) messagesUnsubscribe();
      activeChat = null;
    };

    // --- Свой профиль ---
    profileBtn.onclick = () => {
      profileModal.style.display = 'flex';
      get(ref(db, `users/${myNick}`)).then(snap => {
        const data = snap.val() || {};
        profileName.value = data.displayName || myNick;
        if (data.avatar) {
          profileAvatar.style.backgroundImage = `url('${data.avatar}')`;
          profileAvatar.textContent = '';
        } else {
          profileAvatar.style.backgroundImage = '';
          profileAvatar.style.background = getAvatarColor(myNick);
          profileAvatar.textContent = myNick.charAt(0).toUpperCase();
        }
      });
    };
    closeProfile.onclick = () => profileModal.style.display = 'none';
    avatarUpload.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          profileAvatar.style.backgroundImage = `url('${ev.target.result}')`;
          profileAvatar.textContent = '';
          window.tempAvatar = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    };
    saveProfile.onclick = async () => {
      const updates = {};
      updates[`users/${myNick}/displayName`] = profileName.value;
      if (window.tempAvatar) {
        updates[`users/${myNick}/avatar`] = window.tempAvatar;
        avatarCache.set(myNick, window.tempAvatar);
      }
      await update(ref(db), updates);
      myDisplayName = profileName.value;
      headerName.innerHTML = myDisplayName;
      if (isCreator) headerName.innerHTML += '<span class="creator-badge">Создатель💫</span>';
      if (window.tempAvatar) {
        headerAvatar.style.backgroundImage = `url('${window.tempAvatar}')`;
        headerAvatar.textContent = '';
      }
      closeProfile.click();
    };

    // --- Тема ---
    themeToggle.onclick = () => themeModal.style.display = 'flex';
    closeTheme.onclick = () => themeModal.style.display = 'none';
    themeDark.onclick = () => {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
    };
    themeLight.onclick = () => {
      document.body.classList.add('light');
      document.body.classList.remove('dark');
      localStorage.setItem('theme', 'light');
    };
    textColorInput.oninput = (e) => {
      localStorage.setItem('textColor', e.target.value);
      applyTheme();
    };
    document.querySelectorAll('.wallpaper-option').forEach(el => {
      el.onclick = () => {
        const wall = el.dataset.wall;
        localStorage.setItem('wallpaper', wall);
        applyTheme();
      };
    });
    wallpaperUpload.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          localStorage.setItem('wallpaper', `url('${ev.target.result}')`);
          applyTheme();
        };
        reader.readAsDataURL(file);
      }
    };
  </script>
</body>
  </html>
