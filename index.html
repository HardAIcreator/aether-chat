<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Global | Роман</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --accent: #6366f1;
            --text: #f1f5f9; --msg-sent: #4338ca; --msg-rec: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header { padding: 15px 25px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-weight: bold; font-size: 20px; color: var(--accent); }
        #status { font-size: 12px; color: #10b981; }

        /* Messages Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 15px; position: relative; word-wrap: break-word; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--msg-rec); border-bottom-left-radius: 2px; }
        .user-name { font-size: 10px; margin-bottom: 4px; display: block; opacity: 0.7; font-weight: bold; }
        
        /* Media */
        .media-item { width: 100%; border-radius: 8px; margin-top: 8px; max-width: 300px; }

        /* Input Area */
        .input-area { padding: 20px; background: var(--panel); display: flex; gap: 12px; align-items: center; }
        .btn-file { cursor: pointer; font-size: 20px; opacity: 0.7; transition: 0.3s; }
        .btn-file:hover { opacity: 1; transform: scale(1.1); }
        input[type="text"] { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: var(--bg); color: white; outline: none; border: 1px solid #334155; }
        input[type="text"]:focus { border-color: var(--accent); }
        .send-btn { background: var(--accent); border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">AETHER MESH</div>
        <div id="status">● В сети (Global)</div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <label class="btn-file" title="Прикрепить файл">
            📁 <input type="file" id="file-input" hidden accept="image/*,video/*,audio/*">
        </label>
        <input type="text" id="message-input" placeholder="Введите сообщение...">
        <button class="send-btn" id="send-btn">ОТПРАВИТЬ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Твой конфиг Роман, уже подключен!
        const firebaseConfig = {
            apiKey: "AIzaSyBqy8OpoabzNS1z_YaPTzG3siiyfTDvzzo",
            authDomain: "aether-messenger-cafc9.firebaseapp.com",
            databaseURL: "https://aether-messenger-cafc9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aether-messenger-cafc9",
            storageBucket: "aether-messenger-cafc9.firebasestorage.app",
            messagingSenderId: "659803996890",
            appId: "1:659803996890:web:d90d9489bfa658a32ddbe3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "global_chat");

        const myName = "Роман"; // Можешь заменить на prompt("Как тебя зовут?") для выбора имени

        // Функция отправки
        async function sendMessage(text = "", fileData = null, fileType = null) {
            await push(messagesRef, {
                user: myName,
                text: text,
                file: fileData,
                type: fileType,
                timestamp: serverTimestamp()
            });
        }

        // Кнопка отправить
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('message-input');
            if (input.value.trim()) {
                sendMessage(input.value);
                input.value = "";
            }
        };

        // Работа с файлами
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const type = file.type.split('/')[0];
                sendMessage("", event.target.result, type);
            };
            reader.readAsDataURL(file);
        };

        // Слушаем новые сообщения
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const isMe = data.user === myName;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
            
            let html = `<span class="user-name">${data.user}</span>`;
            if (data.text) html += `<div>${data.text}</div>`;
            
            if (data.file) {
                if (data.type === 'image') html += `<img src="${data.file}" class="media-item">`;
                if (data.type === 'video') html += `<video src="${data.file}" controls class="media-item"></video>`;
                if (data.type === 'audio') html += `<audio src="${data.file}" controls class="media-item"></audio>`;
            }

            msgDiv.innerHTML = html;
            const chatBox = document.getElementById('chat-box');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Отправка по Enter
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });
    </script>
</body>
</html>
