<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aether · ultra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      transition: background 0.3s, color 0.3s;
      background: #0b0f19;
    }

    body.light {
      --bg-gradient: radial-gradient(circle at 30% 40%, #f0f4ff 0%, #d9e2f0 90%);
      --glass-bg: rgba(255, 255, 255, 0.5);
      --glass-card: rgba(255, 255, 255, 0.6);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --border-light: rgba(0,0,0,0.1);
    }

    body.dark {
      --bg-gradient: radial-gradient(circle at 30% 40%, #1e2640 0%, #080c14 90%);
      --glass-bg: rgba(20, 30, 45, 0.6);
      --glass-card: rgba(15, 25, 40, 0.7);
      --text-primary: #f0f4ff;
      --text-secondary: #a0b3d9;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.5);
      --border-light: rgba(255,255,255,0.05);
    }

    body {
      background-image: var(--bg-gradient);
      color: var(--text-primary);
    }

    .glass-panel, #auth-screen, .sidebar, .chat-area, .search-box, .current-chat-name, #messages, .contact-item, .msg, .context-menu {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--glass-card);
      border: 1px solid var(--border-light);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    #auth-screen {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    input, button, .emoji-btn {
      padding: 12px 16px;
      border-radius: 40px;
      border: none;
      outline: none;
      background: rgba(0,0,0,0.2);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    button, .emoji-btn {
      background: var(--accent);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    #main-wrapper {
      display: none;
      width: 100%;
      height: 100vh;
      max-height: 95vh;
      border-radius: 2rem;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
    }

    .sidebar {
      width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-light);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--glass-card);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      gap: 8px;
    }

    .search-box {
      padding: 20px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    #contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 20px;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .contact-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      background-size: cover;
      position: relative;
    }

    .online-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      position: absolute;
      bottom: 2px;
      right: 2px;
      border: 2px solid var(--glass-card);
    }

    .contact-info {
      flex: 1;
    }

    .current-chat-name {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border-light);
    }

    #back-to-contacts {
      display: none;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      display: flex;
      max-width: 75%;
      animation: popIn 0.2s;
      position: relative;
    }

    .msg.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.received {
      align-self: flex-start;
    }

    .avatar-bubble {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      margin: 0 8px;
      flex-shrink: 0;
    }

    .bubble-content {
      background: rgba(30,40,60,0.8);
      padding: 10px 16px;
      border-radius: 22px;
      word-break: break-word;
    }

    .msg.sent .bubble-content {
      background: var(--accent);
    }

    .bubble-text img, .bubble-text audio, .bubble-text video {
      max-width: 200px;
      border-radius: 12px;
    }

    .msg-time {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    .reactions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .reaction {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2px 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .reply-context {
      font-size: 0.8rem;
      opacity: 0.7;
      padding: 4px 8px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      margin-bottom: 4px;
    }

    .chat-input-row {
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid var(--border-light);
      align-items: center;
    }

    .chat-input-row input {
      flex: 1;
    }

    .attach-btn, #btn-send, #record-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      background: rgba(30,40,60,0.8);
    }

    #btn-send {
      background: var(--accent);
    }

    #record-btn.recording {
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    .context-menu {
      position: absolute;
      background: var(--glass-card);
      border-radius: 12px;
      padding: 8px 0;
      z-index: 1000;
      display: none;
    }

    .context-menu div {
      padding: 8px 24px;
      cursor: pointer;
    }

    .context-menu div:hover {
      background: rgba(255,255,255,0.1);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @media (max-width: 700px) {
      .sidebar {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(0);
        z-index: 5;
      }
      .chat-area {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 10;
      }
      .chat-area.active {
        transform: translateX(0);
      }
      #back-to-contacts {
        display: inline-block !important;
      }
    }
  </style>
</head>
<body class="dark">
  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i><span>Тема</span><i class="fas fa-moon"></i>
  </div>

  <div id="auth-screen">
    <h2><i class="fas fa-cube"></i> AETHER ULTRA</h2>
    <input type="text" id="auth-nick" placeholder="никнейм">
    <input type="password" id="auth-pass" placeholder="пароль">
    <button id="btn-login"><i class="fas fa-key"></i> Войти / Создать</button>
  </div>

  <div id="main-wrapper">
    <div class="sidebar" id="sidebar">
      <div class="search-box">
        <input type="text" id="search-user" placeholder="поиск пользователей...">
        <button id="btn-search"><i class="fas fa-search"></i></button>
        <button id="new-group"><i class="fas fa-users"></i></button>
      </div>
      <div id="contacts-list"></div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="current-chat-name">
        <button id="back-to-contacts"><i class="fas fa-arrow-left"></i></button>
        <span id="chat-with-title">...</span>
        <span id="typingIndicator" style="margin-left: auto; font-size: 0.8rem; opacity: 0.7;"></span>
      </div>
      <div id="messages"></div>
      <div class="chat-input-row">
        <label class="attach-btn"><i class="fas fa-paperclip"></i>
          <input type="file" id="fileUpload" accept="image/*,audio/*,video/*" hidden>
        </label>
        <button id="record-btn"><i class="fas fa-microphone"></i></button>
        <input type="text" id="msg-input" placeholder="сообщение...">
        <button id="btn-send"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div id="replyOption">Ответить</div>
    <div id="reactOption">Реакция ❤️</div>
  </div>

  <script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onChildAdded, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqy8OpoabzNS1z_YaPTzG3siiyfTDvzzo",
      authDomain: "aether-messenger-cafc9.firebaseapp.com",
      databaseURL: "https://aether-messenger-cafc9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "aether-messenger-cafc9",
      storageBucket: "aether-messenger-cafc9.firebasestorage.app",
      messagingSenderId: "659803996890",
      appId: "1:659803996890:web:d90d9489bfa658a32ddbe3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- State ---
    let myNick = '';
    let myUid = ''; // we'll use nick as uid for simplicity
    let activeChat = null; // { id, type: 'private' | 'group', participants: [] }
    let messagesUnsubscribe = null;
    let contactsUnsubscribe = null;
    let typingTimeout = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let replyTo = null; // { id, text, from }
    const contactsCache = new Map();

    // DOM
    const authScreen = document.getElementById('auth-screen');
    const mainWrapper = document.getElementById('main-wrapper');
    const contactsDiv = document.getElementById('contacts-list');
    const messagesDiv = document.getElementById('messages');
    const chatTitle = document.getElementById('chat-with-title');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('btn-send');
    const searchInput = document.getElementById('search-user');
    const searchBtn = document.getElementById('btn-search');
    const backBtn = document.getElementById('back-to-contacts');
    const chatArea = document.getElementById('chatArea');
    const sidebar = document.getElementById('sidebar');
    const themeToggle = document.getElementById('themeToggle');
    const fileUpload = document.getElementById('fileUpload');
    const recordBtn = document.getElementById('record-btn');
    const newGroupBtn = document.getElementById('new-group');
    const contextMenu = document.getElementById('contextMenu');
    const replyOption = document.getElementById('replyOption');
    const reactOption = document.getElementById('reactOption');
    const typingSpan = document.getElementById('typingIndicator');

    // --- Helpers ---
    function getAvatarColor(nick) {
      let hash = 0;
      for (let i = 0; i < nick.length; i++) hash = nick.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash % 360)}, 70%, 55%)`;
    }

    async function loadAvatar(nick) {
      if (contactsCache.has(nick)) return contactsCache.get(nick);
      const snap = await get(ref(db, `users/${nick}/avatar`));
      const url = snap.val();
      contactsCache.set(nick, url);
      return url;
    }

    // --- Offline cache (simple localStorage) ---
    function cacheMessages(chatId, messages) {
      try {
        localStorage.setItem(`chat_${chatId}`, JSON.stringify(messages.slice(-50))); // last 50
      } catch(e) {}
    }

    function getCachedMessages(chatId) {
      try {
        return JSON.parse(localStorage.getItem(`chat_${chatId}`)) || [];
      } catch { return []; }
    }

    // --- Online status ---
    function setupPresence() {
      if (!myNick) return;
      const userStatusRef = ref(db, `status/${myNick}`);
      set(userStatusRef, 'online');
      onDisconnect(userStatusRef).set('offline');
    }

    // --- Render message with reactions, reply, etc ---
    function drawMessage(msg, isMe) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
      msgDiv.dataset.id = msg.id;
      msgDiv.dataset.from = msg.from;
      msgDiv.dataset.text = msg.text || '';

      if (!isMe) {
        const ava = document.createElement('div');
        ava.className = 'avatar-bubble';
        loadAvatar(msg.from).then(url => {
          if (url) ava.style.backgroundImage = `url('${url}')`;
          else ava.style.background = getAvatarColor(msg.from);
          ava.textContent = msg.from.charAt(0).toUpperCase();
        });
        msgDiv.appendChild(ava);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble-content';

      // Reply context if any
      if (msg.replyTo) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'reply-context';
        replyDiv.innerHTML = `<i class="fas fa-reply"></i> ${msg.replyTo.from}: ${msg.replyTo.text.substring(0,30)}...`;
        bubble.appendChild(replyDiv);
      }

      const textDiv = document.createElement('div');
      textDiv.className = 'bubble-text';
      if (msg.image) {
        const img = document.createElement('img');
        img.src = msg.image;
        textDiv.appendChild(img);
      } else if (msg.audio) {
        const audio = document.createElement('audio');
        audio.src = msg.audio;
        audio.controls = true;
        textDiv.appendChild(audio);
      } else if (msg.video) {
        const video = document.createElement('video');
        video.src = msg.video;
        video.controls = true;
        video.style.maxWidth = '200px';
        textDiv.appendChild(video);
      } else {
        textDiv.textContent = msg.text || '';
      }

      const timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

      // Reactions
      const reactionsDiv = document.createElement('div');
      reactionsDiv.className = 'reactions';
      if (msg.reactions) {
        for (let [emoji, users] of Object.entries(msg.reactions)) {
          const span = document.createElement('span');
          span.className = 'reaction';
          span.textContent = `${emoji} ${users.length}`;
          span.onclick = (e) => { e.stopPropagation(); toggleReaction(msg.id, emoji); };
          reactionsDiv.appendChild(span);
        }
      }

      bubble.appendChild(textDiv);
      bubble.appendChild(timeDiv);
      bubble.appendChild(reactionsDiv);
      msgDiv.appendChild(bubble);

      // Context menu on long press
      msgDiv.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showContextMenu(e.pageX, e.pageY, msg.id, msg.from, msg.text);
      });

      return msgDiv;
    }

    // --- Send message (supports reply, media) ---
    async function sendMessage(content) {
      if (!activeChat) return;
      const chatId = activeChat.id;
      const msg = {
        from: myNick,
        time: Date.now(),
        ...content
      };
      if (replyTo) {
        msg.replyTo = { id: replyTo.id, from: replyTo.from, text: replyTo.text };
        replyTo = null;
      }

      const newRef = await push(ref(db, `chats/${chatId}/messages`), msg);
      // Update last message in contact list
      const lastMsg = content.text || (content.image ? '📷' : (content.audio ? '🎤' : ''));
      for (let p of activeChat.participants) {
        if (p !== myNick) {
          await set(ref(db, `users/${p}/contacts/${myNick}/lastMsg`), lastMsg);
          await set(ref(db, `users/${p}/contacts/${myNick}/lastTime`), Date.now());
        }
      }
    }

    // --- Reactions ---
    async function toggleReaction(msgId, emoji) {
      if (!activeChat) return;
      const reactionRef = ref(db, `chats/${activeChat.id}/messages/${msgId}/reactions/${emoji}`);
      const snap = await get(reactionRef);
      let users = snap.val() || [];
      if (users.includes(myNick)) {
        users = users.filter(u => u !== myNick);
      } else {
        users.push(myNick);
      }
      await set(reactionRef, users);
    }

    // --- Typing indicator ---
    function sendTyping(chatId, isTyping) {
      set(ref(db, `chats/${chatId}/typing/${myNick}`), isTyping ? true : null);
    }

    // --- Load chat messages with virtual scroll (simple limit) ---
    function loadChat(chatId, participants) {
      if (messagesUnsubscribe) messagesUnsubscribe();
      messagesDiv.innerHTML = '';

      // Show cached messages first
      const cached = getCachedMessages(chatId);
      cached.forEach(m => {
        if (m) messagesDiv.appendChild(drawMessage(m, m.from === myNick));
      });

      // Real-time listener
      const messagesRef = ref(db, `chats/${chatId}/messages`);
      messagesUnsubscribe = onChildAdded(messagesRef, (snap) => {
        const msg = { id: snap.key, ...snap.val() };
        // Avoid duplicate if already in cache? We'll just append.
        const isMe = msg.from === myNick;
        messagesDiv.appendChild(drawMessage(msg, isMe));
        // Cache update
        const cached = getCachedMessages(chatId);
        cached.push(msg);
        cacheMessages(chatId, cached);
        scrollIfNeeded();
      });

      // Listen typing
      const typingRef = ref(db, `chats/${chatId}/typing`);
      onValue(typingRef, (snap) => {
        const typing = snap.val() || {};
        const names = Object.keys(typing).filter(n => n !== myNick);
        typingSpan.textContent = names.length ? `${names.join(', ')} печатает...` : '';
      });
    }

    function scrollIfNeeded() {
      const isNearBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < 100;
      if (isNearBottom) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // --- Contacts list with online status ---
    function loadContacts() {
      if (!myNick) return;
      if (contactsUnsubscribe) contactsUnsubscribe();

      const contactsRef = ref(db, `users/${myNick}/contacts`);
      contactsUnsubscribe = onValue(contactsRef, async (snap) => {
        const contacts = snap.val() || {};
        let html = '';
        for (let [nick, data] of Object.entries(contacts)) {
          const avatarUrl = await loadAvatar(nick);
          const statusSnap = await get(ref(db, `status/${nick}`));
          const status = statusSnap.val();
          const online = status === 'online';
          html += `
            <div class="contact-item" data-nick="${nick}" data-type="private">
              <div class="contact-avatar" style="${avatarUrl ? `background-image:url('${avatarUrl}')` : `background:${getAvatarColor(nick)}`}">
                ${!avatarUrl ? nick.charAt(0).toUpperCase() : ''}
                ${online ? '<span class="online-indicator"></span>' : ''}
              </div>
              <div class="contact-info">
                <div><strong>${nick}</strong></div>
                <div style="font-size:0.8rem; opacity:0.7;">${data.lastMsg || ''}</div>
              </div>
            </div>
          `;
        }
        contactsDiv.innerHTML = html || '<div style="padding:20px; text-align:center;">Начните общение</div>';
        document.querySelectorAll('.contact-item').forEach(el => {
          el.addEventListener('click', () => startPrivateChat(el.dataset.nick));
        });
      });
    }

    // --- Start private chat ---
    function startPrivateChat(partner) {
      const chatId = [myNick, partner].sort().join('_');
      activeChat = { id: chatId, type: 'private', participants: [myNick, partner] };
      chatTitle.innerText = `@${partner}`;
      loadChat(chatId, [myNick, partner]);
      if (window.innerWidth <= 700) {
        sidebar.style.transform = 'translateX(-100%)';
        chatArea.classList.add('active');
      }
    }

    // --- Create group ---
    async function createGroup() {
      const name = prompt('Название группы (или оставьте пустым)');
      const members = prompt('Участники (через запятую):');
      if (!members) return;
      const participants = members.split(',').map(s => s.trim()).concat(myNick);
      const groupId = 'group_' + Date.now();
      await set(ref(db, `chats/${groupId}`), { type: 'group', name: name || 'Группа', participants });
      for (let p of participants) {
        await set(ref(db, `users/${p}/contacts/${groupId}`), { lastMsg: '', lastTime: Date.now(), isGroup: true, groupName: name });
      }
      startGroupChat(groupId);
    }

    function startGroupChat(groupId) {
      get(ref(db, `chats/${groupId}`)).then(snap => {
        const data = snap.val();
        activeChat = { id: groupId, type: 'group', participants: data.participants, name: data.name };
        chatTitle.innerText = data.name || 'Группа';
        loadChat(groupId, data.participants);
      });
    }

    // --- Context menu (reply/react) ---
    let currentMsgId = null, currentMsgFrom = null, currentMsgText = null;
    function showContextMenu(x, y, msgId, from, text) {
      contextMenu.style.display = 'block';
      contextMenu.style.left = x + 'px';
      contextMenu.style.top = y + 'px';
      currentMsgId = msgId; currentMsgFrom = from; currentMsgText = text;
    }

    replyOption.onclick = () => {
      replyTo = { id: currentMsgId, from: currentMsgFrom, text: currentMsgText };
      msgInput.placeholder = `Ответ @${currentMsgFrom}...`;
      contextMenu.style.display = 'none';
    };

    reactOption.onclick = () => {
      toggleReaction(currentMsgId, '❤️');
      contextMenu.style.display = 'none';
    };

    document.addEventListener('click', () => contextMenu.style.display = 'none');

    // --- Voice recording ---
    recordBtn.onclick = async () => {
      if (!mediaRecorder) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = () => sendMessage({ audio: reader.result });
            reader.readAsDataURL(blob);
            audioChunks = [];
          };
          mediaRecorder.start();
          recordBtn.classList.add('recording');
        } catch (e) { alert('Микрофон недоступен'); }
      } else {
        mediaRecorder.stop();
        mediaRecorder = null;
        recordBtn.classList.remove('recording');
      }
    };

    // --- File upload (image, video, audio) ---
    fileUpload.onchange = () => {
      const file = fileUpload.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        if (file.type.startsWith('image/')) sendMessage({ image: e.target.result });
        else if (file.type.startsWith('audio/')) sendMessage({ audio: e.target.result });
        else if (file.type.startsWith('video/')) sendMessage({ video: e.target.result });
      };
      reader.readAsDataURL(file);
      fileUpload.value = '';
    };

    // --- Send text ---
    sendBtn.onclick = () => {
      const text = msgInput.value.trim();
      if (text) {
        sendMessage({ text });
        msgInput.value = '';
        msgInput.placeholder = 'Сообщение...';
        replyTo = null;
      }
    };

    msgInput.oninput = () => {
      if (!activeChat) return;
      if (typingTimeout) clearTimeout(typingTimeout);
      sendTyping(activeChat.id, true);
      typingTimeout = setTimeout(() => sendTyping(activeChat.id, false), 2000);
    };

    // --- Auth ---
    document.getElementById('btn-login').onclick = async () => {
      const nick = document.getElementById('auth-nick').value.toLowerCase().trim();
      const pass = document.getElementById('auth-pass').value;
      if (!nick || !pass) return;
      const userRef = ref(db, 'users/' + nick);
      const snap = await get(userRef);
      if (snap.exists()) {
        if (snap.val().password !== pass) return alert('Неверный пароль');
      } else {
        await set(userRef, { password: pass, nickname: nick });
      }
      myNick = nick;
      authScreen.style.display = 'none';
      mainWrapper.style.display = 'flex';
      setupPresence();
      loadContacts();
    };

    // --- Search user / start chat ---
    searchBtn.onclick = async () => {
      const target = searchInput.value.trim().toLowerCase();
      if (!target || target === myNick) return;
      const snap = await get(ref(db, 'users/' + target));
      if (snap.exists()) startPrivateChat(target);
      else alert('Пользователь не найден');
    };

    newGroupBtn.onclick = createGroup;

    // --- Back button mobile ---
    backBtn.onclick = () => {
      sidebar.style.transform = 'translateX(0)';
      chatArea.classList.remove('active');
      if (messagesUnsubscribe) messagesUnsubscribe();
    };

    // --- Theme toggle ---
    themeToggle.onclick = () => {
      document.body.className = document.body.className === 'dark' ? 'light' : 'dark';
    };

    // --- Initial load: try to restore from cache? Not needed.

    console.log('Ultra Aether loaded');
  </script>
</body>
  </html>
